name: ci
on: [push, pull_request]
permissions:
  contents: read
jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [18, 20, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          package-manager-cache: false
      - run: node --test
      - run: node bin/research-vault.mjs init --vault ./ci-vault
      - run: node bin/research-vault.mjs lint --vault ./ci-vault --check
      - run: node scripts/check-agentsmd-drift.mjs
      - run: node scripts/check-encoding.mjs
