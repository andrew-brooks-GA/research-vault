name: ci
on: [push, pull_request]
jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [18, 20, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: node --test
      - run: node bin/research-vault.mjs init --vault ./ci-vault
      - run: node bin/research-vault.mjs lint --vault ./ci-vault --check
      - run: node scripts/check-agentsmd-drift.mjs
      - run: node scripts/check-encoding.mjs
